<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Музыка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --green:#1DB954; --green-dark:#158a3e; --bg:#121212; --surface:#181818;
      --surface2:#282828; --surface3:#333; --text:#FFF; --text2:#B3B3B3; --text3:#535353; --r:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:12px 16px 8px}
    .sw{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:28px;padding:10px 16px;border:2px solid transparent;transition:border-color .2s}
    .sw:focus-within{border-color:var(--green)}
    .si{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:inherit}
    .si::placeholder{color:var(--text3)}
    .sb{background:var(--green);border:none;border-radius:20px;color:#000;font-size:13px;font-weight:700;padding:7px 16px;cursor:pointer;font-family:inherit;white-space:nowrap}
    .sb:active{background:var(--green-dark)}
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:14px;padding:24px;text-align:center}
    .si2{font-size:56px}.st{font-size:18px;font-weight:700}.ss{font-size:13px;color:var(--text2)}
    .spin{width:40px;height:40px;border:3px solid var(--surface3);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .tabs{display:flex;padding:8px 16px 0;border-bottom:1px solid var(--surface3);margin-bottom:4px}
    .tab{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .tab.active{color:var(--green);border-bottom-color:var(--green)}
    .sec{padding:16px 16px 6px;font-size:17px;font-weight:700}
    /* Track card */
    .tc{display:flex;align-items:center;gap:12px;padding:8px 16px;cursor:pointer;transition:background .15s}
    .tc:active{background:var(--surface2)}
    .tc-img{width:52px;height:52px;border-radius:6px;object-fit:cover;background:var(--surface3);flex-shrink:0}
    .tc-ph{width:52px;height:52px;border-radius:6px;background:linear-gradient(135deg,#1a1a1a,var(--surface3));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
    .tc-info{flex:1;min-width:0}
    .tc-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .tc-artist{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tc-dur{font-size:12px;color:var(--text3);flex-shrink:0;margin-left:8px}
    /* Artist card */
    .ac{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s}
    .ac:active{background:var(--surface2)}
    .ac-img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--green-dark),var(--green));flex-shrink:0}
    .ac-ph{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--green-dark),var(--green));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#000;flex-shrink:0}
    .ac-name{font-size:15px;font-weight:600}
    .ac-sub{font-size:12px;color:var(--text2);margin-top:2px}
    /* Artist page */
    .ah{background:linear-gradient(180deg,#1a3a1a,var(--bg));padding:20px 16px 16px}
    .ah-back{display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;color:var(--text2);font-size:14px;background:none;border:none;font-family:inherit}
    .ah-back:active{color:var(--text)}
    .ah-avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--green-dark),var(--green));display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#000;margin-bottom:10px}
    .ah-name{font-size:26px;font-weight:700;margin-bottom:4px}
    .ah-sub{font-size:13px;color:var(--text2)}
    /* Load more */
    .lm{display:block;width:calc(100% - 32px);margin:12px 16px;padding:13px;background:var(--surface2);border:none;border-radius:var(--r);color:var(--text2);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center}
    .lm:active{background:var(--surface3)}
    /* Download overlay */
    .ob{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
    .od{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 32px;z-index:200;animation:su .25s;box-shadow:0 -4px 24px rgba(0,0,0,.5)}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .od-label{font-size:13px;color:var(--text2);text-align:center;margin-bottom:6px}
    .od-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:18px;line-height:1.4}
    .od-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;background:var(--surface2);border:none;border-radius:10px;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:10px}
    .od-btn:active{background:var(--surface3)}
    .od-icon{font-size:20px;width:28px;text-align:center}
    .od-cancel{display:block;width:100%;padding:13px;background:none;border:none;color:var(--text3);font-size:15px;font-family:inherit;cursor:pointer;text-align:center}
    .results{padding-bottom:80px}
  </style>
</head>
<body>
  <div class="header">
    <div class="sw">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#535353" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="si" id="si" type="text" placeholder="Артист, трек..." autocomplete="off">
      <button class="sb" onclick="doSearch()">Найти</button>
    </div>
  </div>
  <div id="app"></div>

<script>
const tg=window.Telegram.WebApp; tg.ready(); tg.expand();
const params=new URLSearchParams(window.location.search);
const uid=params.get('uid')||'';
const wb=decodeURIComponent(params.get('webhook')||'');
const app=document.getElementById('app');
let tracks=[],artists=[],shownT=0,shownA=0;
const PG=12;
let mode='search',activeTab='tracks',curArtist=null,artTracks=[],pending=null;

document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
showEmpty();

function showEmpty(){app.innerHTML=`<div class="state"><div class="si2">🎵</div><div class="st">Найди музыку</div><div class="ss">Введи артиста или название трека</div></div>`}
function showLoad(){app.innerHTML=`<div class="state"><div class="spin"></div><div class="ss" style="margin-top:8px">Ищу в Spotify...</div></div>`}
function showErr(m){app.innerHTML=`<div class="state"><div class="si2">😕</div><div class="st">${m}</div></div>`}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function letter(n){return(n||'?')[0].toUpperCase()}

async function doSearch(){
  const q=document.getElementById('si').value.trim(); if(!q)return;
  mode='search'; showLoad();
  try{
    const r=await fetch(wb+'/music_search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,uid})});
    const d=await r.json();
    if(!d.ok){showErr('Ошибка поиска');return}
    tracks=d.tracks||[]; artists=d.artists||[];
    shownT=0; shownA=0;
    activeTab=tracks.length?'tracks':'artists';
    renderResults();
  }catch(e){showErr('Нет соединения')}
}

function renderResults(){
  if(!tracks.length&&!artists.length){showErr('Ничего не найдено');return}
  let h=`<div class="tabs">
    <div class="tab ${activeTab==='tracks'?'active':''}" onclick="sw('tracks')">Треки ${tracks.length?'('+tracks.length+')':''}</div>
    <div class="tab ${activeTab==='artists'?'active':''}" onclick="sw('artists')">Артисты ${artists.length?'('+artists.length+')':''}</div>
  </div><div class="results" id="rc">`;
  if(activeTab==='tracks'){
    const sl=tracks.slice(0,PG); shownT=sl.length;
    sl.forEach((t,i)=>{h+=trackCard(t,i)});
    if(shownT<tracks.length)h+=`<button class="lm" onclick="loadT()">⬇️ Ещё треки (${tracks.length-shownT})</button>`;
  }else{
    const sl=artists.slice(0,PG); shownA=sl.length;
    sl.forEach((a,i)=>{h+=artistCard(a,i)});
    if(shownA<artists.length)h+=`<button class="lm" onclick="loadA()">⬇️ Ещё артисты</button>`;
  }
  h+='</div>'; app.innerHTML=h;
}

function sw(tab){activeTab=tab;shownT=0;shownA=0;renderResults()}

function loadT(){
  const rc=document.getElementById('rc'); rc.querySelector('.lm')?.remove();
  const sl=tracks.slice(shownT,shownT+PG); const st=shownT; shownT+=sl.length;
  sl.forEach((t,i)=>rc.insertAdjacentHTML('beforeend',trackCard(t,st+i)));
  if(shownT<tracks.length)rc.insertAdjacentHTML('beforeend',`<button class="lm" onclick="loadT()">⬇️ Ещё треки (${tracks.length-shownT})</button>`);
}

function loadA(){
  const rc=document.getElementById('rc'); rc.querySelector('.lm')?.remove();
  const sl=artists.slice(shownA,shownA+PG); const sa=shownA; shownA+=sl.length;
  sl.forEach((a,i)=>rc.insertAdjacentHTML('beforeend',artistCard(a,sa+i)));
}

function trackCard(t,idx){
  const src=mode==='artist'?artTracks:tracks;
  const thumb=t.thumb?`<img class="tc-img" src="${esc(t.thumb)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`:'';
  const ph=`<div class="tc-ph" ${t.thumb?'style="display:none"':''}>🎵</div>`;
  return `<div class="tc" onclick="selectTrack(${idx})">${thumb}${ph}<div class="tc-info"><div class="tc-title">${esc(t.title)}</div><div class="tc-artist">${esc(t.artist||'')}</div></div><div class="tc-dur">${esc(t.duration||'')}</div></div>`;
}

function artistCard(a,idx){
  const thumb=a.thumb?`<img class="ac-img" src="${esc(a.thumb)}" loading="lazy">`:`<div class="ac-ph">${letter(a.name)}</div>`;
  const subs=a.followers?formatNum(a.followers)+' слушателей':'';
  return `<div class="ac" onclick="openArtist(${idx})">${thumb}<div><div class="ac-name">${esc(a.name)}</div><div class="ac-sub">${subs||'Нажми чтобы открыть'}</div></div></div>`;
}

function formatNum(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return n}

function selectTrack(idx){
  const list=mode==='artist'?artTracks:tracks;
  const t=list[idx]; if(!t)return;
  pending=t; showOverlay(t);
}

function showOverlay(t){
  closeOverlay();
  const bg=document.createElement('div'); bg.className='ob'; bg.id='ob'; bg.onclick=closeOverlay; document.body.appendChild(bg);
  const el=document.createElement('div'); el.className='od'; el.id='od';
  el.innerHTML=`<div class="od-label">Скачать трек</div>
    <div class="od-title">${esc(t.title)}${t.artist?' — '+esc(t.artist):''}</div>
    <button class="od-btn" onclick="downloadTrack()"><span class="od-icon">⬇️</span><div><div>Скачать MP3</div><div style="font-size:11px;color:var(--text2);font-weight:400">320kbps · с обложкой</div></div></button>
    <button class="od-cancel" onclick="closeOverlay()">Отмена</button>`;
  document.body.appendChild(el);
}

function closeOverlay(){document.getElementById('od')?.remove();document.getElementById('ob')?.remove();pending=null}

async function downloadTrack(){
  const t=pending; if(!t)return; closeOverlay();
  try{
    await fetch(wb+'/select_music',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:t.url||'spotify:'+t.spotify_id,title:t.title,artist:t.artist||'',thumb:t.thumb||'',search_query:t.search_query||t.title,uid})});
  }catch(e){}
  tg.close();
}

async function openArtist(idx){
  const a=artists[idx]; curArtist=a; mode='artist';
  app.innerHTML=`<div class="state"><div class="spin"></div><div class="ss" style="margin-top:8px">Загружаю ${esc(a.name)}...</div></div>`;
  try{
    const r=await fetch(wb+'/music_search',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:a.name,artist_id:a.spotify_id||'',uid})});
    const d=await r.json();
    artTracks=d.tracks||[];
  }catch(e){artTracks=[]}
  renderArtist(a);
}

function renderArtist(a){
  const thumb=a.thumb?`<img class="ah-avatar" src="${esc(a.thumb)}">`:`<div class="ah-avatar">${letter(a.name)}</div>`;
  let h=`<div class="ah"><button class="ah-back" onclick="backToSearch()">← Назад</button>${thumb}<div class="ah-name">${esc(a.name)}</div><div class="ah-sub">Популярные треки</div></div><div class="results">`;
  if(!artTracks.length){h+=`<div class="state"><div class="si2">🎵</div><div class="st">Треки не найдены</div></div>`}
  else{artTracks.forEach((t,i)=>{h+=trackCard(t,i)})}
  h+='</div>'; app.innerHTML=h;
}

function backToSearch(){mode='search';renderResults()}
</script>
</body>
</html>
