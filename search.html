<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Поиск видео</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --accent: #ff4444;
      --accent2: #ff6b35;
      --text: #f1f1f1;
      --text2: #aaaaaa;
      --text3: #666666;
      --radius: 10px;
      --thumb-ratio: 56.25%; /* 16:9 */
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      padding: 10px 12px 8px;
      border-bottom: 1px solid #222;
    }
    .search-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border-radius: 24px;
      padding: 8px 14px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-bar svg { flex-shrink: 0; color: var(--text3); }
    .search-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 15px; font-family: inherit;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-btn {
      background: var(--accent); border: none; border-radius: 18px;
      color: white; font-size: 13px; font-weight: 600;
      padding: 6px 14px; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .search-btn:active { opacity: 0.8; }

    /* ── States ── */
    .state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 12px; padding: 24px;
      text-align: center;
    }
    .state-icon { font-size: 48px; }
    .state-title { font-size: 17px; font-weight: 600; color: var(--text2); }
    .state-sub { font-size: 13px; color: var(--text3); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #333; border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 0;
      padding: 8px 12px 0;
      border-bottom: 1px solid #222;
    }
    .tab {
      flex: 1; text-align: center;
      padding: 8px 0; font-size: 13px; font-weight: 600;
      color: var(--text3); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* ── Video Grid ── */
    .results { padding: 8px 0 80px; }

    .video-card {
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s;
      display: block;
    }
    .video-card:active { background: var(--surface); }

    .thumb-wrap {
      position: relative;
      width: 100%; padding-top: var(--thumb-ratio);
      border-radius: var(--radius);
      overflow: hidden; background: #222;
      margin-bottom: 8px;
    }
    .thumb-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity 0.3s;
    }
    .thumb-wrap img.loading { opacity: 0; }
    .thumb-placeholder {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .duration-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.85); color: white;
      font-size: 11px; font-weight: 700;
      padding: 2px 5px; border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .video-meta { display: flex; gap: 10px; align-items: flex-start; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 700;
      color: white; margin-top: 1px;
    }
    .video-info { flex: 1; min-width: 0; }
    .video-title {
      font-size: 14px; font-weight: 600; line-height: 1.4;
      color: var(--text); margin-bottom: 3px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-sub {
      font-size: 12px; color: var(--text3); line-height: 1.4;
    }

    /* ── Channel Grid ── */
    .channel-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; cursor: pointer;
      transition: background 0.15s;
    }
    .channel-card:active { background: var(--surface); }
    .channel-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #48cae4);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .channel-name { font-size: 15px; font-weight: 600; }
    .channel-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

    /* ── Load more ── */
    .load-more-btn {
      display: block; width: calc(100% - 24px);
      margin: 8px 12px 16px; padding: 12px;
      background: var(--surface2); border: none; border-radius: var(--radius);
      color: var(--text2); font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; text-align: center;
      transition: background 0.2s;
    }
    .load-more-btn:active { background: var(--surface); }

    /* ── Channel videos header ── */
    .channel-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px; border-bottom: 1px solid #222;
    }
    .back-btn {
      background: var(--surface2); border: none; border-radius: 50%;
      width: 34px; height: 34px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; color: var(--text);
      font-size: 18px; flex-shrink: 0;
    }
    .channel-header-name { font-size: 16px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="header">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Поиск видео или автора..." autocomplete="off"
             inputmode="search">
      <button class="search-btn" onclick="doSearch()">Найти</button>
    </div>
  </div>

  <div id="app"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid') || '';
    const webhook = params.get('webhook') || '';
    const initQuery = params.get('q') || '';

    const app = document.getElementById('app');
    let allVideos = [], allChannels = [];
    let shownVideos = 0, PAGE = 10;
    let currentMode = 'search'; // 'search' | 'channel'
    let currentChannel = null;
    let channelVideos = [];
    let activeTab = 'videos';

    // ── Init ──
    if (initQuery) {
      document.getElementById('searchInput').value = initQuery;
      doSearch();
    } else {
      showEmpty();
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    function showEmpty() {
      app.innerHTML = `<div class="state">
        <div class="state-icon">🔍</div>
        <div class="state-title">Найди видео или автора</div>
        <div class="state-sub">Введи название и нажми Найти</div>
      </div>`;
    }

    function showLoading() {
      app.innerHTML = `<div class="state"><div class="spinner"></div><div class="state-title">Ищу...</div></div>`;
    }

    function showError(msg) {
      app.innerHTML = `<div class="state">
        <div class="state-icon">😕</div>
        <div class="state-title">${msg}</div>
      </div>`;
    }

    // ── Search ──
    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      currentMode = 'search';
      showLoading();

      try {
        const resp = await fetch(decodeURIComponent(webhook) + '/search', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({query: q, uid})
        });
        const data = await resp.json();
        if (!data.ok) { showError('Ошибка поиска'); return; }
        allVideos = data.videos || [];
        allChannels = data.channels || [];
        shownVideos = 0;
        activeTab = allVideos.length ? 'videos' : 'channels';
        renderSearchResults();
      } catch(e) {
        showError('Нет соединения с ботом');
      }
    }

    function renderSearchResults() {
      if (!allVideos.length && !allChannels.length) {
        showError('Ничего не найдено');
        return;
      }

      let html = `<div class="tabs">
        <div class="tab ${activeTab==='videos'?'active':''}" onclick="switchTab('videos')">
          Видео ${allVideos.length ? `(${allVideos.length})` : ''}
        </div>
        <div class="tab ${activeTab==='channels'?'active':''}" onclick="switchTab('channels')">
          Авторы ${allChannels.length ? `(${allChannels.length})` : ''}
        </div>
      </div><div class="results" id="resultsContainer">`;

      if (activeTab === 'videos') {
        const toShow = allVideos.slice(0, shownVideos + PAGE);
        shownVideos = toShow.length;
        toShow.forEach((v, i) => { html += videoCard(v, i); });
        if (shownVideos < allVideos.length) {
          html += `<button class="load-more-btn" onclick="loadMore()">Загрузить ещё</button>`;
        }
      } else {
        allChannels.forEach((ch, i) => { html += channelCard(ch, i); });
      }

      html += '</div>';
      app.innerHTML = html;
    }

    function switchTab(tab) {
      activeTab = tab;
      shownVideos = 0;
      renderSearchResults();
    }

    function loadMore() {
      const container = document.getElementById('resultsContainer');
      const toShow = allVideos.slice(shownVideos, shownVideos + PAGE);
      shownVideos += toShow.length;
      // Remove load more btn
      const btn = container.querySelector('.load-more-btn');
      if (btn) btn.remove();
      // Append new cards
      toShow.forEach((v, i) => {
        container.insertAdjacentHTML('beforeend', videoCard(v, shownVideos - toShow.length + i));
      });
      if (shownVideos < allVideos.length) {
        container.insertAdjacentHTML('beforeend',
          `<button class="load-more-btn" onclick="loadMore()">Загрузить ещё</button>`);
      }
      initLazyImages();
    }

    function avatarLetter(name) {
      return (name || '?')[0].toUpperCase();
    }

    function videoCard(v, idx) {
      const thumb = v.thumbnail || '';
      const duration = v.duration || '';
      const channel = v.channel || '';
      const date = v.date || '';
      return `<div class="video-card" onclick="selectVideo(${idx})">
        <div class="thumb-wrap">
          ${thumb
            ? `<img class="loading" data-src="${thumb}" alt="" onload="this.classList.remove('loading')">`
            : `<div class="thumb-placeholder">▶️</div>`}
          ${duration ? `<div class="duration-badge">${duration}</div>` : ''}
        </div>
        <div class="video-meta">
          <div class="avatar">${avatarLetter(channel)}</div>
          <div class="video-info">
            <div class="video-title">${escHtml(v.title)}</div>
            <div class="video-sub">${escHtml(channel)}${date ? ' · ' + escHtml(date) : ''}</div>
          </div>
        </div>
      </div>`;
    }

    function channelCard(ch, idx) {
      return `<div class="channel-card" onclick="openChannel(${idx})">
        <div class="channel-avatar">${avatarLetter(ch.name)}</div>
        <div>
          <div class="channel-name">${escHtml(ch.name)}</div>
          <div class="channel-sub">Нажми чтобы посмотреть видео</div>
        </div>
      </div>`;
    }

    // ── Select video ──
    async function selectVideo(idx) {
      const videos = currentMode === 'channel' ? channelVideos : allVideos;
      const v = videos[idx];
      if (!v) return;
      tg.close();
      // Отправляем выбор боту
      try {
        await fetch(decodeURIComponent(webhook) + '/select_video', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url: v.url, title: v.title, uid})
        });
      } catch(e) {}
    }

    // ── Open channel ──
    async function openChannel(idx) {
      const ch = allChannels[idx];
      currentChannel = ch;
      currentMode = 'channel';
      app.innerHTML = `<div class="state"><div class="spinner"></div><div class="state-title">Загружаю канал...</div></div>`;
      try {
        const resp = await fetch(decodeURIComponent(webhook) + '/channel_videos', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({channel_url: ch.url, uid})
        });
        const data = await resp.json();
        channelVideos = data.videos || [];
        renderChannelVideos(ch);
      } catch(e) {
        showError('Не удалось загрузить канал');
      }
    }

    function renderChannelVideos(ch) {
      let html = `<div class="channel-header">
        <button class="back-btn" onclick="backToSearch()">←</button>
        <div class="channel-header-name">${escHtml(ch.name)}</div>
      </div><div class="results">`;
      channelVideos.forEach((v, i) => { html += videoCard(v, i); });
      html += '</div>';
      app.innerHTML = html;
      initLazyImages();
    }

    function backToSearch() {
      currentMode = 'search';
      renderSearchResults();
      initLazyImages();
    }

    // ── Lazy images ──
    function initLazyImages() {
      document.querySelectorAll('img[data-src]').forEach(img => {
        if (!img.src) {
          img.src = img.dataset.src;
          delete img.dataset.src;
        }
      });
    }

    // ── After render ──
    const observer = new MutationObserver(() => initLazyImages());
    observer.observe(document.getElementById('app'), {childList: true, subtree: true});

    function escHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
