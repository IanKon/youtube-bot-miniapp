<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Поиск видео</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
      --accent: #ff4444; --text: #f1f1f1; --text2: #aaaaaa; --text3: #666;
      --radius: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Manrope',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    .header {
      position:sticky; top:0; z-index:100;
      background:var(--bg); padding:10px 12px 8px;
      border-bottom:1px solid #222;
    }
    .search-bar {
      display:flex; align-items:center; gap:8px;
      background:var(--surface2); border-radius:24px;
      padding:8px 14px; border:1.5px solid transparent; transition:border-color .2s;
    }
    .search-bar:focus-within { border-color:var(--accent); }
    .search-bar svg { flex-shrink:0; color:var(--text3); }
    .search-input {
      flex:1; background:none; border:none; outline:none;
      color:var(--text); font-size:15px; font-family:inherit;
    }
    .search-input::placeholder { color:var(--text3); }
    .search-btn {
      background:var(--accent); border:none; border-radius:18px;
      color:white; font-size:13px; font-weight:600;
      padding:6px 14px; cursor:pointer; font-family:inherit; white-space:nowrap;
    }
    .search-btn:active { opacity:.8; }

    .state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:60vh; gap:12px; padding:24px; text-align:center;
    }
    .state-icon { font-size:48px; }
    .state-title { font-size:17px; font-weight:600; color:var(--text2); }
    .state-sub { font-size:13px; color:var(--text3); }
    .spinner {
      width:36px; height:36px; border:3px solid #333; border-top-color:var(--accent);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .tabs {
      display:flex; padding:8px 12px 0; border-bottom:1px solid #222;
    }
    .tab {
      flex:1; text-align:center; padding:8px 0;
      font-size:13px; font-weight:600; color:var(--text3);
      cursor:pointer; border-bottom:2px solid transparent; transition:all .2s;
    }
    .tab.active { color:var(--text); border-bottom-color:var(--accent); }

    .results { padding:4px 0 80px; }

    /* Video card */
    .video-card { padding:8px 12px; cursor:pointer; transition:background .15s; }
    .video-card:active { background:var(--surface); }
    .thumb-wrap {
      position:relative; width:100%; padding-top:56.25%;
      border-radius:var(--radius); overflow:hidden; background:#222; margin-bottom:8px;
    }
    .thumb-wrap img {
      position:absolute; top:0; left:0; width:100%; height:100%;
      object-fit:cover; transition:opacity .3s;
    }
    .thumb-wrap img.lazy { opacity:0; }
    .thumb-ph {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
      display:flex; align-items:center; justify-content:center; font-size:32px;
    }
    .duration-badge {
      position:absolute; bottom:6px; right:6px;
      background:rgba(0,0,0,.85); color:white;
      font-size:11px; font-weight:700; padding:2px 5px; border-radius:4px;
    }
    .video-meta { display:flex; gap:10px; align-items:flex-start; }
    .avatar {
      width:34px; height:34px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#ff6b35);
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:white; margin-top:1px; cursor:pointer;
    }
    .video-info { flex:1; min-width:0; }
    .video-title {
      font-size:14px; font-weight:600; line-height:1.4; color:var(--text); margin-bottom:3px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .video-sub { font-size:12px; color:var(--text3); }
    .video-channel-link { color:var(--text2); cursor:pointer; }
    .video-channel-link:hover { text-decoration:underline; }

    /* Channel card */
    .channel-card {
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:12px; cursor:pointer; transition:background .15s;
    }
    .channel-card:active { background:var(--surface); }
    .channel-left { display:flex; align-items:center; gap:12px; }
    .channel-avatar {
      width:52px; height:52px; border-radius:50%;
      background:linear-gradient(135deg,#6c63ff,#48cae4);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:700; color:white; flex-shrink:0;
    }
    .channel-name { font-size:15px; font-weight:600; }
    .channel-sub { font-size:12px; color:var(--text3); margin-top:2px; }
    .sub-btn {
      background:white; color:#0f0f0f; border:none;
      border-radius:18px; padding:7px 14px;
      font-size:12px; font-weight:700; cursor:pointer;
      font-family:inherit; white-space:nowrap; flex-shrink:0;
    }
    .sub-btn.subbed { background:var(--surface2); color:var(--text2); }
    .sub-btn:active { opacity:.8; }

    /* Channel header */
    .channel-header {
      display:flex; align-items:center; gap:10px;
      padding:12px; border-bottom:1px solid #222;
    }
    .back-btn {
      background:var(--surface2); border:none; border-radius:50%;
      width:34px; height:34px; display:flex; align-items:center;
      justify-content:center; cursor:pointer; color:var(--text); font-size:18px;
    }
    .channel-header-info { flex:1; }
    .channel-header-name { font-size:16px; font-weight:700; }
    .ch-sub-btn {
      background:white; color:#0f0f0f; border:none;
      border-radius:18px; padding:8px 16px;
      font-size:13px; font-weight:700; cursor:pointer;
      font-family:inherit; white-space:nowrap;
    }
    .ch-sub-btn.subbed { background:var(--surface2); color:var(--text2); }

    .load-more-btn {
      display:block; width:calc(100% - 24px); margin:8px 12px 16px;
      padding:12px; background:var(--surface2); border:none;
      border-radius:var(--radius); color:var(--text2);
      font-size:14px; font-weight:600; font-family:inherit; cursor:pointer;
    }
    .load-more-btn:active { background:var(--surface); }

    /* Toast */
    .toast {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:#333; color:white; padding:10px 20px; border-radius:20px;
      font-size:14px; font-weight:600; opacity:0; transition:opacity .3s;
      pointer-events:none; z-index:999; white-space:nowrap;
    }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Поиск видео или автора..." autocomplete="off" inputmode="search">
      <button class="search-btn" onclick="doSearch()">Найти</button>
    </div>
  </div>

  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid') || '';
    const webhookBase = decodeURIComponent(params.get('webhook') || '');

    let allVideos = [], allChannels = [], shownCount = 0;
    const PAGE = 10;
    let activeTab = 'videos';
    let currentMode = 'search';
    let channelVideos = [], currentChannel = null;
    let subscribedChannels = new Set(); // channel_id

    showEmpty();
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    function showEmpty() {
      app().innerHTML = `<div class="state">
        <div class="state-icon">🔍</div>
        <div class="state-title">Найди видео или автора</div>
        <div class="state-sub">Введи запрос и нажми Найти</div>
      </div>`;
    }

    function showLoading(msg) {
      app().innerHTML = `<div class="state"><div class="spinner"></div>
        <div class="state-title">${msg||'Загружаю...'}</div></div>`;
    }

    function showError(msg) {
      app().innerHTML = `<div class="state">
        <div class="state-icon">😕</div>
        <div class="state-title">${msg}</div>
      </div>`;
    }

    function app() { return document.getElementById('app'); }

    function toast(msg, ms=2000) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms);
    }

    // ── Search ──
    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      currentMode = 'search';
      showLoading('Ищу...');
      try {
        const resp = await fetch(webhookBase + '/search', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({query:q, uid})
        });
        const data = await resp.json();
        if (!data.ok) { showError('Ошибка поиска'); return; }
        allVideos = data.videos || [];
        allChannels = data.channels || [];
        shownCount = 0;
        activeTab = allVideos.length ? 'videos' : 'channels';
        renderSearch();
      } catch(e) {
        showError('Нет связи с ботом');
      }
    }

    function renderSearch() {
      if (!allVideos.length && !allChannels.length) { showError('Ничего не найдено'); return; }
      let html = `<div class="tabs">
        <div class="tab ${activeTab==='videos'?'active':''}" onclick="switchTab('videos')">
          Видео${allVideos.length ? ` (${allVideos.length})` : ''}
        </div>
        <div class="tab ${activeTab==='channels'?'active':''}" onclick="switchTab('channels')">
          Авторы${allChannels.length ? ` (${allChannels.length})` : ''}
        </div>
      </div><div class="results" id="rc">`;

      if (activeTab === 'videos') {
        const slice = allVideos.slice(shownCount, shownCount + PAGE);
        shownCount += slice.length;
        slice.forEach((v,i) => html += videoCard(v, i));
        if (shownCount < allVideos.length)
          html += `<button class="load-more-btn" onclick="loadMoreSearch()">Загрузить ещё</button>`;
      } else {
        allChannels.forEach((ch,i) => html += channelCard(ch, i, false));
      }
      html += '</div>';
      app().innerHTML = html;
      lazyLoad();
    }

    function switchTab(tab) {
      activeTab = tab; shownCount = 0; renderSearch();
    }

    function loadMoreSearch() {
      const rc = document.getElementById('rc');
      const btn = rc.querySelector('.load-more-btn');
      if (btn) btn.remove();
      const slice = allVideos.slice(shownCount, shownCount + PAGE);
      shownCount += slice.length;
      slice.forEach((v,i) => rc.insertAdjacentHTML('beforeend', videoCard(v, shownCount - slice.length + i)));
      if (shownCount < allVideos.length)
        rc.insertAdjacentHTML('beforeend', `<button class="load-more-btn" onclick="loadMoreSearch()">Загрузить ещё</button>`);
      lazyLoad();
    }

    // ── Channel page ──
    async function openChannel(ch) {
      currentChannel = ch; currentMode = 'channel';
      showLoading('Загружаю канал...');
      try {
        const resp = await fetch(webhookBase + '/channel_videos', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({channel_url: ch.url, uid})
        });
        const data = await resp.json();
        channelVideos = data.videos || [];
        renderChannel();
      } catch(e) { showError('Не удалось загрузить канал'); }
    }

    function renderChannel() {
      const ch = currentChannel;
      const isSubbed = subscribedChannels.has(ch.channel_id);
      let html = `<div class="channel-header">
        <button class="back-btn" onclick="backToSearch()">←</button>
        <div class="channel-header-info">
          <div class="channel-header-name">${esc(ch.name)}</div>
        </div>
        <button class="ch-sub-btn ${isSubbed?'subbed':''}"
          onclick="toggleChannelSub(event, '${esc(ch.channel_id)}', '${esc(ch.name)}', '${esc(ch.url)}')">
          ${isSubbed ? '✓ Подписан' : '+ Подписаться'}
        </button>
      </div><div class="results" id="rc">`;
      channelVideos.forEach((v,i) => html += videoCard(v, i));
      html += '</div>';
      app().innerHTML = html;
      lazyLoad();
    }

    function backToSearch() {
      currentMode = 'search'; shownCount = 0; renderSearch();
    }

    // ── Subscribe to channel ──
    async function toggleChannelSub(e, channelId, channelName, channelUrl) {
      e.stopPropagation();
      if (subscribedChannels.has(channelId)) {
        // Unsubscribe
        subscribedChannels.delete(channelId);
        await sendToBot('/unsubscribe_channel', {channel_id: channelId, uid});
        toast('Отписались от канала');
        if (currentMode === 'channel') renderChannel();
        return;
      }
      // Subscribe — show notification offer
      subscribedChannels.add(channelId);
      await sendToBot('/subscribe_channel', {
        channel_id: channelId, channel_name: channelName,
        channel_url: channelUrl, uid
      });
      // Show notification prompt
      const offer = confirm(`Подписались на "${channelName}"!\n\nХочешь получать уведомления о новых видео автоматически?`);
      if (offer) {
        await sendToBot('/enable_notifications', {
          channel_id: channelId, channel_name: channelName,
          channel_url: channelUrl, uid
        });
        toast('✅ Уведомления включены!');
      } else {
        toast('✅ Подписались на канал');
      }
      if (currentMode === 'channel') renderChannel();
    }

    async function sendToBot(path, body) {
      try {
        await fetch(webhookBase + path, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
      } catch(e) {}
    }

    // ── Select video ──
    async function selectVideo(idx) {
      const videos = currentMode === 'channel' ? channelVideos : allVideos;
      const v = videos[idx]; if (!v) return;
      tg.close();
      try {
        await fetch(webhookBase + '/select_video', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({url: v.url, title: v.title, uid})
        });
      } catch(e) {}
    }

    // ── Cards ──
    function videoCard(v, idx) {
      const thumb = v.thumbnail || '';
      return `<div class="video-card" onclick="selectVideo(${idx})">
        <div class="thumb-wrap">
          ${thumb
            ? `<img class="lazy" data-src="${esc(thumb)}" alt="">`
            : `<div class="thumb-ph">▶️</div>`}
          ${v.duration ? `<div class="duration-badge">${esc(v.duration)}</div>` : ''}
        </div>
        <div class="video-meta">
          <div class="avatar" onclick="event.stopPropagation(); avatarClick(${idx})">${letter(v.channel)}</div>
          <div class="video-info">
            <div class="video-title">${esc(v.title)}</div>
            <div class="video-sub">
              <span class="video-channel-link" onclick="event.stopPropagation(); avatarClick(${idx})">${esc(v.channel)}</span>
              ${v.date ? ' · ' + esc(v.date) : ''}
            </div>
          </div>
        </div>
      </div>`;
    }

    function avatarClick(idx) {
      const videos = currentMode === 'channel' ? channelVideos : allVideos;
      const v = videos[idx];
      if (!v || !v.channel_url) return;
      openChannel({name: v.channel, channel_id: v.channel_id || '', url: v.channel_url});
    }

    function channelCard(ch, idx, isSubbed) {
      const subbed = subscribedChannels.has(ch.channel_id) || isSubbed;
      return `<div class="channel-card" onclick="openChannel(${JSON.stringify(ch).replace(/"/g,'&quot;')})">
        <div class="channel-left">
          <div class="channel-avatar">${letter(ch.name)}</div>
          <div>
            <div class="channel-name">${esc(ch.name)}</div>
            <div class="channel-sub">Нажми чтобы посмотреть видео</div>
          </div>
        </div>
        <button class="sub-btn ${subbed?'subbed':''}"
          onclick="event.stopPropagation(); toggleChannelSub(event, '${esc(ch.channel_id)}', '${esc(ch.name)}', '${esc(ch.url)}')">
          ${subbed ? '✓ Подписан' : 'Подписаться'}
        </button>
      </div>`;
    }

    // ── Lazy load ──
    function lazyLoad() {
      document.querySelectorAll('img.lazy[data-src]').forEach(img => {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
        img.onload = () => img.classList.remove('lazy');
      });
    }

    new MutationObserver(lazyLoad).observe(document.getElementById('app'), {childList:true, subtree:true});

    function letter(s) { return (s||'?')[0].toUpperCase(); }
    function esc(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>
</body>
</html>
