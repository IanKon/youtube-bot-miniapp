<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реклама</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="//libtl.com/sdk.js" data-zone="10955979" data-sdk="show_10955979"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e; color: white; height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .container { width: 100%; max-width: 400px; text-align: center; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #e0e0e0; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      width: 100%; padding: 18px; border: none; border-radius: 14px;
      font-size: 17px; font-weight: bold; cursor: pointer;
      font-family: inherit; margin-bottom: 12px; transition: all 0.2s;
    }
    .btn-watch { background: linear-gradient(135deg, #6c63ff, #48cae4); color: white; }
    .btn-watch:disabled { background: #2a2a3e; color: #555; cursor: not-allowed; }
    .btn-get { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
    .btn-get:disabled { background: #2a2a3e; color: #555; cursor: not-allowed; }
    .status { font-size: 13px; color: #6c63ff; margin-top: 12px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎬</div>
    <div class="title">Получи видео бесплатно</div>
    <div class="subtitle">Посмотри короткую рекламу — и видео начнёт загружаться в боте</div>

    <button class="btn btn-watch" id="watchBtn" onclick="watchAd()">▶️ Смотреть рекламу</button>
    <button class="btn btn-get" id="getBtn" disabled onclick="finish()">🎬 Получить видео</button>

    <div class="status" id="statusMsg"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const uid = params.get('uid') || '';
    const webhook = params.get('webhook') || '';

    const watchBtn = document.getElementById('watchBtn');
    const getBtn = document.getElementById('getBtn');
    const statusMsg = document.getElementById('statusMsg');
    let adWatched = false;

    function watchAd() {
      watchBtn.disabled = true;
      watchBtn.textContent = '⏳ Загружаю рекламу...';
      show_10955979().then(() => {
        adWatched = true;
        watchBtn.textContent = '✅ Реклама просмотрена';
        getBtn.disabled = false;
        statusMsg.textContent = '✅ Нажми кнопку ниже чтобы получить видео';
      }).catch(() => {
        watchBtn.disabled = false;
        watchBtn.textContent = '▶️ Смотреть рекламу';
        statusMsg.textContent = '❌ Досмотри рекламу до конца';
      });
    }

    async function finish() {
      if (!adWatched) return;
      getBtn.disabled = true;
      getBtn.textContent = '⏳ Загружаю...';
      statusMsg.textContent = '⏳ Отправляю запрос...';
      try {
        const resp = await fetch(webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, user_id: uid })
        });
        const data = await resp.json();
        if (data.ok) {
          statusMsg.textContent = '✅ Готово! Видео загружается в боте.';
          getBtn.textContent = '✅ Отправлено!';
          setTimeout(() => tg.close(), 1500);
        } else throw new Error();
      } catch(e) {
        statusMsg.textContent = '❌ Ошибка. Попробуй ещё раз.';
        getBtn.disabled = false;
        getBtn.textContent = '🎬 Получить видео';
      }
    }
  </script>
</body>
</html>
